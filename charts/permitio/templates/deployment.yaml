apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "permitio.fullname" . }}
  labels:
    {{- include "permitio.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "permitio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "permitio.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: permitio
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.config.port }}
          protocol: TCP
        env:
        - name: PORT
          value: {{ .Values.config.port | quote }}
        volumeMounts:
        - name: config
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /v2/schema/resources
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v2/schema/resources
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: {{ include "permitio.fullname" . }}
